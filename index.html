<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>魔方AI - 开启跨境 AI 时代的一站式增长方案</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    /* ============================================================
       LOCKED PARAMETERS - DO NOT MODIFY
       backdrop-filter: blur(20px) saturate(180%)
       glass-bg: rgba(17, 18, 19, 0.6)
       glass-border: rgba(255, 255, 255, 0.1)
       glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8)
    ============================================================ */

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --glass-bg: rgba(17, 18, 19, 0.6);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-blur: blur(20px) saturate(180%);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
      --accent: #7C3AED;
      --accent-light: #A78BFA;
      --text-primary: #F8FAFC;
      --text-secondary: rgba(248, 250, 252, 0.6);
      --text-dim: rgba(248, 250, 252, 0.28);
      --border-subtle: rgba(255, 255, 255, 0.05);
    }

    html, body {
      width: 100%; height: 100%;
      background: #030712;
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ====== COLORBENDS CANVAS ====== */
    #colorCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ====== NAVBAR ====== */
    #navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      z-index: 200;
      display: flex;
      align-items: center;
      padding: 0 48px;
      transition: background 0.35s, border-color 0.35s, backdrop-filter 0.35s;
    }

    #navbar.scrolled {
      background: rgba(17, 18, 19, 0.75);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--glass-border);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .nav-logo img {
      height: 26px;
      width: auto;
    }

    .nav-logo-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
      margin: 0 auto;
    }

    .nav-link {
      padding: 7px 14px;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      border-radius: 8px;
      transition: color 0.18s, background 0.18s;
      cursor: pointer;
      background: none;
      border: none;
      letter-spacing: -0.1px;
    }

    .nav-link:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.06);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    /* ====== BUTTONS ====== */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 20px;
      background: linear-gradient(135deg, #7C3AED 0%, #5B21B6 100%);
      border: 1px solid rgba(167, 139, 250, 0.35);
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(124, 58, 237, 0.35), inset 0 1px 0 rgba(255,255,255,0.15);
      letter-spacing: -0.1px;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.5), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 20px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, color 0.18s;
      text-decoration: none;
      letter-spacing: -0.1px;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      color: var(--text-primary);
    }

    /* ====== HERO SECTION ====== */
    #hero {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 140px 48px 100px;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px;
      background: rgba(124, 58, 237, 0.12);
      border: 1px solid rgba(124, 58, 237, 0.28);
      border-radius: 100px;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--accent-light);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 36px;
      animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .hero-title {
      font-size: clamp(44px, 5.2vw, 76px);
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -2.5px;
      margin-bottom: 24px;
      background: linear-gradient(180deg, #ffffff 0%, rgba(255, 255, 255, 0.65) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      max-width: 880px;
      animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
    }

    .hero-subtitle {
      font-size: 17px;
      color: var(--text-secondary);
      max-width: 640px;
      line-height: 1.75;
      margin-bottom: 52px;
      letter-spacing: -0.2px;
      animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }

    .hero-cta {
      display: flex;
      align-items: center;
      gap: 14px;
      justify-content: center;
      animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    }

    .btn-hero-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #7C3AED 0%, #5B21B6 100%);
      border: 1px solid rgba(167, 139, 250, 0.4);
      border-radius: 12px;
      color: white;
      font-size: 15.5px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.22s, box-shadow 0.22s;
      text-decoration: none;
      box-shadow: 0 8px 28px rgba(124, 58, 237, 0.45), inset 0 1px 0 rgba(255,255,255,0.18);
      letter-spacing: -0.2px;
    }

    .btn-hero-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 40px rgba(124, 58, 237, 0.55), inset 0 1px 0 rgba(255,255,255,0.22);
    }

    .btn-hero-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 14px 28px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 12px;
      color: var(--text-secondary);
      font-size: 15.5px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.2s;
      text-decoration: none;
      letter-spacing: -0.2px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .btn-hero-secondary:hover {
      background: rgba(255, 255, 255, 0.09);
      border-color: rgba(255, 255, 255, 0.22);
      color: var(--text-primary);
      transform: translateY(-1px);
    }

    /* ====== ANIMATIONS ====== */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(28px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ====== SCROLLBAR ====== */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  </style>
</head>
<body>

  <!-- ColorBends Background -->
  <canvas id="colorCanvas"></canvas>

  <!-- Navbar -->
  <nav id="navbar">
    <a class="nav-logo" href="#">
      <img src="./logo.svg" alt="魔方AI Logo">
      <span class="nav-logo-name">魔方AI</span>
    </a>

    <div class="nav-links">
      <a class="nav-link" href="#">产品功能</a>
      <a class="nav-link" href="#">AI市场</a>
      <a class="nav-link" href="#">开发平台</a>
      <a class="nav-link" href="#">博客</a>
      <a class="nav-link" href="#">价格</a>
    </div>

    <div class="nav-actions">
      <a class="btn-primary" href="#">
        <i data-lucide="download" style="width:14px;height:14px;"></i>
        下载
      </a>
    </div>
  </nav>

  <!-- Hero Section -->
  <section id="hero">
    <div class="hero-eyebrow">
      <i data-lucide="sparkles" style="width:12px;height:12px;"></i>
      跨境电商 AI 助手
    </div>

    <h1 class="hero-title">
      开启跨境 AI 时代的<br>一站式增长方案
    </h1>

    <p class="hero-subtitle">
      魔方 AI 实现从账号保护到智能选品、文案生成的全流程闭环，助生意在 AI 浪潮中抢占先机。告别多软件拼凑的低效时代。
    </p>

    <div class="hero-cta">
      <a class="btn-hero-primary" href="#">
        <i data-lucide="zap" style="width:16px;height:16px;"></i>
        马上开始
      </a>
      <a class="btn-hero-secondary" href="#">
        <i data-lucide="play-circle" style="width:16px;height:16px;"></i>
        看AI如何工作
      </a>
    </div>
  </section>

  <script>
    // ====== Lucide Icons ======
    lucide.createIcons();

    // ====== Navbar scroll effect ======
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
      navbar.classList.toggle('scrolled', window.scrollY > 20);
    });

    // ====== ColorBends Canvas Animation ======
    // 棱镜折射彩虹光带效果：3条细长弧形光带在黑色背景上缓慢移动
    // 每条光带：createLinearGradient 垂直于带方向，颜色 蓝→青→绿→黄→红
    // screen 混合模式，t+=8 步进（调用方保持不变）
    (function () {
      const canvas = document.getElementById('colorCanvas');
      const ctx    = canvas.getContext('2d');

      let w, h, diag;
      function resize() {
        canvas.width  = w = window.innerWidth;
        canvas.height = h = window.innerHeight;
        diag = Math.hypot(w, h) * 1.15;
      }
      resize();
      window.addEventListener('resize', resize);

      // 绘制一条彩虹光带
      // angle: 旋转角度（弧度），yOff: 垂直于光带方向的偏移量，bw: 光带宽度
      function drawBand(angle, yOff, bw) {
        ctx.save();
        ctx.translate(w * 0.5, h * 0.5);
        ctx.rotate(angle);

        // 线性渐变：沿 y 轴（垂直于光带），从 yOff-bw/2 到 yOff+bw/2
        const g = ctx.createLinearGradient(0, yOff - bw * 0.5, 0, yOff + bw * 0.5);
        g.addColorStop(0.00, 'rgba(  0,   0,   0, 0)');   // 透明边缘
        g.addColorStop(0.06, 'rgba( 60,   0, 255, 0.92)'); // 蓝紫
        g.addColorStop(0.22, 'rgba(  0, 140, 255, 0.95)'); // 蓝
        g.addColorStop(0.38, 'rgba(  0, 245, 210, 0.95)'); // 青
        g.addColorStop(0.52, 'rgba(  0, 255,  70, 0.92)'); // 绿
        g.addColorStop(0.66, 'rgba(210, 255,   0, 0.90)'); // 黄绿
        g.addColorStop(0.80, 'rgba(255,  70,   0, 0.92)'); // 橙红
        g.addColorStop(0.93, 'rgba(255,   0,  90, 0.88)'); // 红品
        g.addColorStop(1.00, 'rgba(  0,   0,   0, 0)');   // 透明边缘

        ctx.globalCompositeOperation = 'screen';
        ctx.fillStyle = g;
        // 光带沿 x 轴延伸整个对角线长度
        ctx.fillRect(-diag, yOff - bw * 0.5, diag * 2, bw);
        ctx.restore();
      }

      let t = 0;

      function draw() {
        // 1) 纯黑底
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, w, h);

        // 2) 基础角度：以极慢速度小幅旋转（±4°，周期约130s）
        const baseAngle = 0.52 + Math.sin(t * 0.000100) * 0.07;

        // 3) 三条光带：各自以不同频率/相位在垂直方向缓慢漂移
        //    振幅覆盖屏幕大部分区域，周期约20-35秒
        const y1 =  Math.sin(t * 0.000520)         * 340;          // ~25s 周期
        const y2 =  Math.sin(t * 0.000390 + 2.094) * 280 + 180;    // ~33s，偏下
        const y3 =  Math.sin(t * 0.000460 + 4.189) * 260 - 200;    // ~28s，偏上

        drawBand(baseAngle,         y1, 110);
        drawBand(baseAngle + 0.030, y2,  88);
        drawBand(baseAngle - 0.025, y3,  96);

        // 4) 边缘暗角
        ctx.globalCompositeOperation = 'source-over';
        const s   = Math.min(w, h);
        const vg  = ctx.createRadialGradient(w*0.5, h*0.5, s*0.08, w*0.5, h*0.5, s*0.92);
        vg.addColorStop(0, 'rgba(0,0,0,0)');
        vg.addColorStop(1, 'rgba(0,0,0,0.72)');
        ctx.fillStyle = vg;
        ctx.fillRect(0, 0, w, h);

        t += 8;
        requestAnimationFrame(draw);
      }

      draw();
    })();
  </script>
</body>
</html>

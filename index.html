<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>魔方AI - 开启跨境 AI 时代的一站式增长方案</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    /* ============================================================
       LOCKED PARAMETERS - DO NOT MODIFY
       backdrop-filter: blur(20px) saturate(180%)
       glass-bg: rgba(17, 18, 19, 0.6)
       glass-border: rgba(255, 255, 255, 0.1)
       glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8)
    ============================================================ */

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --glass-bg: rgba(17, 18, 19, 0.6);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-blur: blur(20px) saturate(180%);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
      --accent: #7C3AED;
      --accent-light: #A78BFA;
      --text-primary: #F8FAFC;
      --text-secondary: rgba(248, 250, 252, 0.6);
      --text-dim: rgba(248, 250, 252, 0.28);
      --border-subtle: rgba(255, 255, 255, 0.05);
    }

    html, body {
      width: 100%; height: 100%;
      background: #030712;
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ====== COLORBENDS BACKGROUND ====== */
    /* CSS blob approach: blur + mix-blend-mode:screen on dark bg */
    .color-bends {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .cb-orb {
      position: absolute;
      border-radius: 50%;
      will-change: transform;
    }

    /* Orb 1: Deep violet — upper-left, large */
    .cb-orb-1 {
      width: 900px; height: 700px;
      background: radial-gradient(ellipse at center, rgba(109,40,217,0.95) 0%, rgba(109,40,217,0.4) 40%, transparent 70%);
      filter: blur(90px);
      top: -180px; left: -120px;
      animation: cbDrift1 24s ease-in-out infinite alternate;
    }

    /* Orb 2: Royal blue — upper-right */
    .cb-orb-2 {
      width: 800px; height: 750px;
      background: radial-gradient(ellipse at center, rgba(37,99,235,0.9) 0%, rgba(37,99,235,0.35) 45%, transparent 70%);
      filter: blur(100px);
      top: -100px; right: -150px;
      animation: cbDrift2 28s ease-in-out infinite alternate;
    }

    /* Orb 3: Purple — center-bottom, wide */
    .cb-orb-3 {
      width: 1000px; height: 600px;
      background: radial-gradient(ellipse at center, rgba(139,92,246,0.85) 0%, rgba(91,33,182,0.3) 50%, transparent 70%);
      filter: blur(110px);
      bottom: -100px; left: 50%;
      transform: translateX(-50%);
      animation: cbDrift3 32s ease-in-out infinite alternate;
    }

    /* Orb 4: Indigo — left-bottom */
    .cb-orb-4 {
      width: 650px; height: 650px;
      background: radial-gradient(ellipse at center, rgba(67,56,202,0.88) 0%, rgba(49,46,129,0.3) 50%, transparent 70%);
      filter: blur(80px);
      bottom: -50px; left: -80px;
      animation: cbDrift4 20s ease-in-out infinite alternate;
    }

    /* Orb 5: Teal — right side */
    .cb-orb-5 {
      width: 600px; height: 600px;
      background: radial-gradient(ellipse at center, rgba(14,116,144,0.75) 0%, rgba(8,145,178,0.25) 50%, transparent 70%);
      filter: blur(95px);
      top: 40%; right: -80px;
      animation: cbDrift5 26s ease-in-out infinite alternate;
    }

    /* Orb 6: Pink-violet accent — upper-center */
    .cb-orb-6 {
      width: 500px; height: 500px;
      background: radial-gradient(ellipse at center, rgba(167,139,250,0.7) 0%, rgba(124,58,237,0.2) 55%, transparent 70%);
      filter: blur(70px);
      top: 5%; left: 35%;
      animation: cbDrift6 18s ease-in-out infinite alternate;
    }

    @keyframes cbDrift1 {
      0%   { transform: translate(0px, 0px) scale(1); }
      100% { transform: translate(160px, 200px) scale(1.15); }
    }
    @keyframes cbDrift2 {
      0%   { transform: translate(0px, 0px) scale(1); }
      100% { transform: translate(-180px, 160px) scale(1.1); }
    }
    @keyframes cbDrift3 {
      0%   { transform: translateX(-50%) scale(1) rotate(0deg); }
      100% { transform: translateX(calc(-50% + 100px)) scale(1.2) rotate(5deg); }
    }
    @keyframes cbDrift4 {
      0%   { transform: translate(0px, 0px) scale(1); }
      100% { transform: translate(140px, -180px) scale(1.25); }
    }
    @keyframes cbDrift5 {
      0%   { transform: translate(0px, 0px) scale(1); }
      100% { transform: translate(-120px, -150px) scale(1.15); }
    }
    @keyframes cbDrift6 {
      0%   { transform: translate(0px, 0px) scale(1); }
      100% { transform: translate(80px, 120px) scale(1.3); }
    }

    /* ====== NAVBAR ====== */
    #navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      z-index: 200;
      display: flex;
      align-items: center;
      padding: 0 48px;
      transition: background 0.35s, border-color 0.35s, backdrop-filter 0.35s;
    }

    #navbar.scrolled {
      background: rgba(17, 18, 19, 0.75);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--glass-border);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .nav-logo img {
      height: 26px;
      width: auto;
    }

    .nav-logo-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
      margin: 0 auto;
    }

    .nav-link {
      padding: 7px 14px;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      border-radius: 8px;
      transition: color 0.18s, background 0.18s;
      cursor: pointer;
      background: none;
      border: none;
      letter-spacing: -0.1px;
    }

    .nav-link:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.06);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    /* ====== BUTTONS ====== */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 20px;
      background: linear-gradient(135deg, #7C3AED 0%, #5B21B6 100%);
      border: 1px solid rgba(167, 139, 250, 0.35);
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(124, 58, 237, 0.35), inset 0 1px 0 rgba(255,255,255,0.15);
      letter-spacing: -0.1px;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.5), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 20px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, color 0.18s;
      text-decoration: none;
      letter-spacing: -0.1px;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      color: var(--text-primary);
    }

    /* ====== HERO SECTION ====== */
    #hero {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 140px 48px 100px;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px;
      background: rgba(124, 58, 237, 0.12);
      border: 1px solid rgba(124, 58, 237, 0.28);
      border-radius: 100px;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--accent-light);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 36px;
      animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .hero-title {
      font-size: clamp(44px, 5.2vw, 76px);
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -2.5px;
      margin-bottom: 24px;
      background: linear-gradient(180deg, #ffffff 0%, rgba(255, 255, 255, 0.65) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      max-width: 880px;
      animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
    }

    .hero-subtitle {
      font-size: 17px;
      color: var(--text-secondary);
      max-width: 640px;
      line-height: 1.75;
      margin-bottom: 52px;
      letter-spacing: -0.2px;
      animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }

    .hero-cta {
      display: flex;
      align-items: center;
      gap: 14px;
      justify-content: center;
      animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    }

    .btn-hero-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #7C3AED 0%, #5B21B6 100%);
      border: 1px solid rgba(167, 139, 250, 0.4);
      border-radius: 12px;
      color: white;
      font-size: 15.5px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.22s, box-shadow 0.22s;
      text-decoration: none;
      box-shadow: 0 8px 28px rgba(124, 58, 237, 0.45), inset 0 1px 0 rgba(255,255,255,0.18);
      letter-spacing: -0.2px;
    }

    .btn-hero-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 40px rgba(124, 58, 237, 0.55), inset 0 1px 0 rgba(255,255,255,0.22);
    }

    .btn-hero-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 14px 28px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 12px;
      color: var(--text-secondary);
      font-size: 15.5px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.2s;
      text-decoration: none;
      letter-spacing: -0.2px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .btn-hero-secondary:hover {
      background: rgba(255, 255, 255, 0.09);
      border-color: rgba(255, 255, 255, 0.22);
      color: var(--text-primary);
      transform: translateY(-1px);
    }

    /* ====== ANIMATIONS ====== */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(28px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ====== SCROLLBAR ====== */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  </style>
</head>
<body>

  <!-- ColorBends Background -->
  <div class="color-bends">
    <div class="cb-orb cb-orb-1"></div>
    <div class="cb-orb cb-orb-2"></div>
    <div class="cb-orb cb-orb-3"></div>
    <div class="cb-orb cb-orb-4"></div>
    <div class="cb-orb cb-orb-5"></div>
    <div class="cb-orb cb-orb-6"></div>
  </div>

  <!-- Navbar -->
  <nav id="navbar">
    <a class="nav-logo" href="#">
      <img src="./logo.svg" alt="魔方AI Logo">
      <span class="nav-logo-name">魔方AI</span>
    </a>

    <div class="nav-links">
      <a class="nav-link" href="#">产品功能</a>
      <a class="nav-link" href="#">AI市场</a>
      <a class="nav-link" href="#">开发平台</a>
      <a class="nav-link" href="#">博客</a>
      <a class="nav-link" href="#">价格</a>
    </div>

    <div class="nav-actions">
      <a class="btn-primary" href="#">
        <i data-lucide="download" style="width:14px;height:14px;"></i>
        下载
      </a>
    </div>
  </nav>

  <!-- Hero Section -->
  <section id="hero">
    <div class="hero-eyebrow">
      <i data-lucide="sparkles" style="width:12px;height:12px;"></i>
      跨境电商 AI 助手
    </div>

    <h1 class="hero-title">
      开启跨境 AI 时代的<br>一站式增长方案
    </h1>

    <p class="hero-subtitle">
      魔方 AI 实现从账号保护到智能选品、文案生成的全流程闭环，助生意在 AI 浪潮中抢占先机。告别多软件拼凑的低效时代。
    </p>

    <div class="hero-cta">
      <a class="btn-hero-primary" href="#">
        <i data-lucide="zap" style="width:16px;height:16px;"></i>
        马上开始
      </a>
      <a class="btn-hero-secondary" href="#">
        <i data-lucide="play-circle" style="width:16px;height:16px;"></i>
        看AI如何工作
      </a>
    </div>
  </section>

  <script>
    // ====== Lucide Icons ======
    lucide.createIcons();

    // ====== Navbar scroll effect ======
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
      navbar.classList.toggle('scrolled', window.scrollY > 20);
    });

    // ColorBends는 CSS 애니메이션으로 처리됨 (color-bends divs)
  </script>
</body>
</html>
